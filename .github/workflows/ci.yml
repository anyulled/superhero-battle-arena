name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration, docs]

    name: ${{ matrix.test-type == 'unit' && 'Unit Tests' || (matrix.test-type == 'integration' && 'Integration Tests (PostgreSQL)' || 'Javadoc Generation') }}

    permissions:
      contents: read
      checks: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run Unit Tests
        if: matrix.test-type == 'unit'
        run: ./mvnw -B clean test

      - name: Run Integration Tests with Testcontainers
        if: matrix.test-type == 'integration'
        run: ./mvnw -B clean verify -Ppostgres-tests

      - name: Generate Javadoc
        if: matrix.test-type == 'docs'
        run: ./mvnw -B javadoc:javadoc

      - name: Upload Javadoc
        if: matrix.test-type == 'docs'
        uses: actions/upload-artifact@v7
        with:
          name: javadoc
          path: target/site/apidocs/

      - name: Publish Test Report
        uses: dorny/test-reporter@v2
        if: always() && matrix.test-type != 'docs'
        with:
          name: ${{ matrix.test-type == 'unit' && 'Unit Tests' || 'Integration Tests' }}
          path: ${{ matrix.test-type == 'unit' && 'target/surefire-reports/TEST-*.xml' || 'target/failsafe-reports/TEST-*.xml' }}
          reporter: java-junit
          fail-on-error: false

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always() && (matrix.test-type == 'unit' || matrix.test-type == 'integration')
        with:
          name: jacoco-coverage-${{ matrix.test-type }}
          path: target/site/jacoco/

      - name: Add Coverage PR Comment
        uses: madrapps/jacoco-report@v1.7.2
        if: github.event_name == 'pull_request' && (matrix.test-type == 'unit' || matrix.test-type == 'integration') && always()
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 90
          min-coverage-changed-files: 90
          title: "Code Coverage - ${{ matrix.test-type }}"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.test-type == 'unit'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: anyulled/superhero-battle-arena
          files: target/site/jacoco/jacoco.xml
          flags: unit-tests
          fail_ci_if_error: false

  mutation:
    runs-on: ubuntu-latest
    name: Mutation Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run Mutation Tests
        run: ./mvnw -B clean test-compile org.pitest:pitest-maven:mutationCoverage

      - name: Upload Pitest Report
        uses: actions/upload-artifact@v7
        with:
          name: pit-report
          path: target/pit-reports/

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run Jazzer Fuzz Tests
        run: ./mvnw -B test -Pfuzz-tests

      - name: Upload Jazzer Corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jazzer-corpus
          path: src/test/resources/corpus/

  commitlint:
    runs-on: ubuntu-latest
    name: Commit Lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: commitlint
        uses: wagoid/commitlint-github-action@v6

  scorecard:
    runs-on: ubuntu-latest
    name: AI Hardness Scorecard
    if: github.event_name != 'pull_request'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: markmishaev76/ai-harness-scorecard@v1
        id: scorecard

      - name: Commit badge and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp scorecard-badge.json /tmp/scorecard-badge.json
          cp scorecard-report.md /tmp/scorecard-report.md
          rm -f scorecard-badge.json scorecard-report.md
          git fetch origin scorecard
          git checkout scorecard
          cp /tmp/scorecard-badge.json scorecard-badge.json
          cp /tmp/scorecard-report.md scorecard-report.md
          git add scorecard-badge.json scorecard-report.md
          git diff --cached --quiet || git commit -m "chore: update scorecard badge and report"
          git push origin scorecard

  quality:
    runs-on: ubuntu-latest
    name: Documentation Quality Checks
    steps:
      - uses: actions/checkout@v6

      - name: TODO and FIXME scanner
        run: |
          if grep -rnw "src" -e "TODO" -e "FIXME"; then
            echo "Found TODO/FIXME comments. Please resolve them."
            exit 1
          else
            echo "No TODO/FIXME comments found."
          fi

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --base ${{ github.workspace }} --offline --include-fragments *.md docs/**/*.md
          fail: true

      - name: Vale Linter
        uses: errata-ai/vale-action@reviewdog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: README.md docs/ CONTRIBUTING.md
          fail_on_error: true

  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Snyk Security Scan
        uses: snyk/actions/setup@master

      - name: Snyk Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

      - name: OWASP Dependency-Check
        run: ./mvnw org.owasp:dependency-check-maven:check

      - name: Sonatype OSS Index Scan
        run: ./mvnw org.sonatype.ossindex.maven:ossindex-maven-plugin:audit
