name: Review App on Clever Cloud
on:
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize
      - reopened
    branches:
      - main

concurrency:
  group: review-app-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    name: Deploy to Clever Cloud
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Clever Tools
        run: npm install -g clever-tools

      - name: Create or Update Clever Cloud App
        env:
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          ORGA_ID: ${{ secrets.ORGA_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          clever login --token "$CLEVER_TOKEN" --secret "$CLEVER_SECRET"

          APP_ALIAS="${REPOSITORY_NAME}-PR-${PR_NUMBER}"
          LOCAL_BRANCH="pr-${PR_NUMBER}"

          if ! clever applications list --only-aliases -o "$ORGA_ID" | grep -Fxq "$APP_ALIAS"; then
            clever create --type maven --org "$ORGA_ID" --alias "$APP_ALIAS" "$APP_ALIAS"
          fi

          git switch -c "$LOCAL_BRANCH"
          clever link "$APP_ALIAS" -o "$ORGA_ID" -a "$APP_ALIAS"
          clever deploy -a "$APP_ALIAS" -b "$LOCAL_BRANCH"

  cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    name: Delete Clever Cloud App
    steps:
      - name: Install Clever Tools
        run: npm install -g clever-tools

      - name: Delete Clever Cloud App
        env:
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          ORGA_ID: ${{ secrets.ORGA_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          clever login --token "$CLEVER_TOKEN" --secret "$CLEVER_SECRET"

          APP_ALIAS="${REPOSITORY_NAME}-PR-${PR_NUMBER}"
          if clever applications list --only-aliases -o "$ORGA_ID" | grep -Fxq "$APP_ALIAS"; then
            clever delete --alias "$APP_ALIAS" --yes
          fi
